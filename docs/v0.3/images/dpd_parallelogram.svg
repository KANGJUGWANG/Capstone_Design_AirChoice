<svg width="100%" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- DPD 수평 격자선 -->
  <line x1="74" y1="340" x2="618" y2="340" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="74" y1="250" x2="618" y2="250" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="74" y1="160" x2="618" y2="160" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="74" y1="70"  x2="618" y2="70"  stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- 평행사변형 본체: BL(84,427) TL(500,70) TR(602,70) BR(185,427) -->
  <polygon points="84,427 500,70 602,70 185,427" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>

  <!-- 사선 엣지 강조 (수집 1일차 / 30일차 관측선) -->
  <line x1="84" y1="427" x2="500" y2="70" stroke="#1D9E75" stroke-width="2"/>
  <line x1="185" y1="427" x2="602" y2="70" stroke="#0F6E56" stroke-width="2" stroke-dasharray="6 3"/>

  <!-- 축 -->
  <line x1="74" y1="430" x2="624" y2="430" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="74" y1="442" x2="74" y2="44" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Y축 DPD 레이블 -->
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="66" y="430" text-anchor="end" dominant-baseline="central">0</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="66" y="340" text-anchor="end" dominant-baseline="central">30</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="66" y="250" text-anchor="end" dominant-baseline="central">60</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="66" y="160" text-anchor="end" dominant-baseline="central">90</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="66" y="70"  text-anchor="end" dominant-baseline="central">120</text>

  <!-- 축 제목 -->
  <text font-family="sans-serif" font-size="12" fill="#444441" x="350" y="458" text-anchor="middle">출발예정일 →</text>
  <text font-family="sans-serif" font-size="12" fill="#444441" x="26" y="250" text-anchor="middle" transform="rotate(-90,26,250)">DPD (출발까지 남은 일수) →</text>

  <!-- 수집 기간 브래킷 (하단) -->
  <line x1="84" y1="446" x2="185" y2="446" stroke="#888780" stroke-width="1"/>
  <line x1="84" y1="442" x2="84" y2="450" stroke="#888780" stroke-width="1"/>
  <line x1="185" y1="442" x2="185" y2="450" stroke="#888780" stroke-width="1"/>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="134" y="464" text-anchor="middle">수집 기간 (예: 30일)</text>

  <!-- DPD=60 수준의 폭 표시 화살표 -->
  <!-- DPD=60에서 좌측 경계: dep=60, x=80+60*3.5=290 / 우측: dep=89, x=80+89*3.5=391 -->
  <line x1="291" y1="248" x2="391" y2="248" stroke="#0F6E56" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="11" fill="#0F6E56" x="341" y="241" text-anchor="middle">항상 동일 (수집 기간)</text>

  <!-- 수집 1일차 관측선 라벨 (실선 엣지) -->
  <!-- 좌측 엣지 1/3 지점: (223, 308) -->
  <line x1="130" y1="282" x2="218" y2="302" stroke="#9FE1CB" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="44" y="262" width="88" height="32" rx="4" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="11" fill="#085041" x="88" y="276" text-anchor="middle">수집 1일차</text>
  <text font-family="sans-serif" font-size="11" fill="#085041" x="88" y="289" text-anchor="middle">관측선</text>

  <!-- 수집 30일차 관측선 라벨 (파선 엣지) -->
  <!-- 우측 엣지 1/3 지점: (324, 308) -->
  <line x1="468" y1="282" x2="329" y2="302" stroke="#9FE1CB" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="468" y="262" width="100" height="32" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="5 2"/>
  <text font-family="sans-serif" font-size="11" fill="#085041" x="518" y="276" text-anchor="middle">수집 30일차</text>
  <text font-family="sans-serif" font-size="11" fill="#085041" x="518" y="289" text-anchor="middle">관측선</text>

  <!-- 중앙 레이블 -->
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="343" y="210" text-anchor="middle">관측 데이터 누적 영역</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="343" y="228" text-anchor="middle">평행사변형</text>
</svg>
